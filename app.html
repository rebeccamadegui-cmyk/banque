<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Banque - Gestion des Comptes</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
      }

      h1 {
        text-align: center;
        color: white;
        margin-bottom: 30px;
        font-size: 2.5em;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
      }

      .card {
        background: white;
        border-radius: 10px;
        padding: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        transition: transform 0.3s ease;
      }

      .card:hover {
        transform: translateY(-5px);
      }

      .card h2 {
        color: #667eea;
        margin-bottom: 15px;
        border-bottom: 2px solid #667eea;
        padding-bottom: 10px;
      }

      .card h3 {
        color: #333;
        margin-top: 15px;
        margin-bottom: 10px;
        font-size: 1em;
      }

      .form-group {
        margin-bottom: 15px;
      }

      label {
        display: block;
        margin-bottom: 5px;
        color: #333;
        font-weight: 500;
      }

      input,
      select {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 5px;
        font-size: 1em;
        transition: border-color 0.3s ease;
      }

      input:focus,
      select:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
      }

      button {
        width: 100%;
        padding: 12px;
        background: #667eea;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 1em;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.3s ease;
      }

      button:hover {
        background: #764ba2;
      }

      button:disabled {
        background: #ccc;
        cursor: not-allowed;
      }

      .message {
        padding: 12px;
        margin-top: 15px;
        border-radius: 5px;
        font-weight: 500;
      }

      .success {
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }

      .error {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }

      .info {
        background: #d1ecf1;
        color: #0c5460;
        border: 1px solid #bee5eb;
      }

      .account-info {
        background: #f8f9fa;
        padding: 15px;
        border-radius: 5px;
        margin-bottom: 15px;
      }

      .account-info p {
        margin: 5px 0;
        color: #333;
      }

      .solde {
        font-size: 1.3em;
        font-weight: bold;
        color: #667eea;
      }

      .transaction-list {
        background: #f8f9fa;
        border-radius: 5px;
        max-height: 300px;
        overflow-y: auto;
        padding: 10px;
      }

      .transaction-item {
        padding: 10px;
        border-left: 3px solid #667eea;
        margin-bottom: 10px;
        background: white;
        border-radius: 3px;
      }

      .transaction-item.retrait {
        border-left-color: #dc3545;
      }

      .transaction-item.depot {
        border-left-color: #28a745;
      }

      .transaction-item.transfert_service_sortant {
        border-left-color: #ffc107;
      }

      .transaction-item.transfert_service_entrant {
        border-left-color: #17a2b8;
      }

      .transaction-item small {
        color: #666;
        display: block;
        margin-top: 5px;
      }

      .tabs {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
        flex-wrap: wrap;
      }

      .tab-button {
        padding: 10px 20px;
        background: white;
        color: #667eea;
        border: 2px solid #667eea;
        border-radius: 5px;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.3s ease;
      }

      .tab-button.active {
        background: #667eea;
        color: white;
      }

      .tab-button:hover {
        background: #667eea;
        color: white;
      }

      .tab-content {
        display: none;
      }

      .tab-content.active {
        display: block;
      }

      .service-badge {
        display: inline-block;
        padding: 5px 10px;
        background: #667eea;
        color: white;
        border-radius: 20px;
        font-size: 0.9em;
        margin-right: 5px;
      }

      .service-badge.om {
        background: #ff6b6b;
      }

      .service-badge.momo {
        background: #4ecdc4;
      }

      .service-badge.uba {
        background: #ffe66d;
        color: #333;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>💳 Gestion Bancaire</h1>

      <!-- Navigation tabs -->
      <div class="tabs">
        <button class="tab-button active" onclick="switchTab('comptes')">
          Comptes
        </button>
        <button class="tab-button" onclick="switchTab('operations')">
          Opérations
        </button>
        <button class="tab-button" onclick="switchTab('services')">
          Transferts Services
        </button>
        <button class="tab-button" onclick="switchTab('transactions')">
          Historique
        </button>
      </div>

      <!-- COMPTES TAB -->
      <div id="comptes" class="tab-content active">
        <div class="grid">
          <div class="card">
            <h2>Mes Comptes</h2>
            <div id="accountsList"></div>
          </div>

          <div class="card">
            <h2>Créer un Compte</h2>
            <div class="form-group">
              <label for="titulaire">Titulaire</label>
              <input
                type="text"
                id="titulaire"
                placeholder="Nom du titulaire"
              />
            </div>
            <button onclick="createAccount()">Créer un Compte</button>
            <div id="createMessage"></div>
          </div>
        </div>
      </div>

      <!-- OPERATIONS TAB -->
      <div id="operations" class="tab-content">
        <div class="grid">
          <div class="card">
            <h2>Dépôt</h2>
            <div class="form-group">
              <label for="depot_account">Compte</label>
              <select id="depot_account" onchange="updateDepotInfo()">
                <option value="">Sélectionner un compte</option>
              </select>
            </div>
            <div id="depot_info"></div>
            <div class="form-group">
              <label for="depot_montant">Montant</label>
              <input
                type="number"
                id="depot_montant"
                placeholder="0.00"
                min="0"
                step="0.01"
              />
            </div>
            <div class="form-group">
              <label for="depot_service">Service (optionnel)</label>
              <select id="depot_service">
                <option value="">Direct</option>
                <option value="OM">OM</option>
                <option value="MOMO">MOMO</option>
                <option value="UBA">UBA</option>
              </select>
            </div>
            <div class="form-group">
              <label for="depot_desc">Description</label>
              <input type="text" id="depot_desc" placeholder="Dépôt" />
            </div>
            <button onclick="makeDeposit()">Effectuer Dépôt</button>
            <div id="depotMessage"></div>
          </div>

          <div class="card">
            <h2>Retrait</h2>
            <div class="form-group">
              <label for="retrait_account">Compte</label>
              <select id="retrait_account" onchange="updateRetraitInfo()">
                <option value="">Sélectionner un compte</option>
              </select>
            </div>
            <div id="retrait_info"></div>
            <div class="form-group">
              <label for="retrait_montant">Montant</label>
              <input
                type="number"
                id="retrait_montant"
                placeholder="0.00"
                min="0"
                step="0.01"
              />
            </div>
            <div class="form-group">
              <label for="retrait_service">Service (optionnel)</label>
              <select id="retrait_service">
                <option value="">Direct</option>
                <option value="OM">OM</option>
                <option value="MOMO">MOMO</option>
                <option value="UBA">UBA</option>
              </select>
            </div>
            <div class="form-group">
              <label for="retrait_desc">Description</label>
              <input type="text" id="retrait_desc" placeholder="Retrait" />
            </div>
            <button onclick="makeWithdrawal()">Effectuer Retrait</button>
            <div id="retraitMessage"></div>
          </div>

          <div class="card">
            <h2>Virement entre Comptes</h2>
            <div class="form-group">
              <label for="virement_from">De (Compte Source)</label>
              <select id="virement_from" onchange="updateVirementInfo()">
                <option value="">Sélectionner un compte</option>
              </select>
            </div>
            <div id="virement_info"></div>
            <div class="form-group">
              <label for="virement_to">Vers (Compte Destinataire)</label>
              <select id="virement_to">
                <option value="">Sélectionner un compte</option>
              </select>
            </div>
            <div class="form-group">
              <label for="virement_montant">Montant</label>
              <input
                type="number"
                id="virement_montant"
                placeholder="0.00"
                min="0"
                step="0.01"
              />
            </div>
            <button onclick="makeTransfer()">Effectuer Virement</button>
            <div id="virementMessage"></div>
          </div>
        </div>
      </div>

      <!-- SERVICES TAB -->
      <div id="services" class="tab-content">
        <div class="grid">
          <div class="card">
            <h2>💸 Transfert vers Service</h2>
            <p>Envoyer de l'argent vers OM, MOMO ou UBA</p>
            <div class="form-group">
              <label for="service_from_account">Votre Compte</label>
              <select
                id="service_from_account"
                onchange="updateServiceFromInfo()"
              >
                <option value="">Sélectionner un compte</option>
              </select>
            </div>
            <div id="service_from_info"></div>
            <div class="form-group">
              <label for="service_destination">Service Destination *</label>
              <select id="service_destination">
                <option value="">Sélectionner un service</option>
                <option value="OM">📱 Orange Money (OM)</option>
                <option value="MOMO">📱 MTN Mobile Money (MOMO)</option>
                <option value="UBA">🏦 UBA Bank</option>
              </select>
            </div>
            <div class="form-group">
              <label for="service_montant">Montant *</label>
              <input
                type="number"
                id="service_montant"
                placeholder="0.00"
                min="0"
                step="0.01"
              />
            </div>
            <div class="form-group">
              <label for="service_numero"
                >Numéro du Bénéficiaire (optionnel)</label
              >
              <input
                type="text"
                id="service_numero"
                placeholder="Ex: +237681234567"
              />
            </div>
            <button onclick="transferToService()">
              Envoyer vers le Service
            </button>
            <div id="serviceTransferMessage"></div>
          </div>

          <div class="card">
            <h2>💰 Recevoir d'un Service</h2>
            <p>Recevoir de l'argent depuis OM, MOMO ou UBA</p>
            <div class="form-group">
              <label for="service_to_account">Compte Récepteur</label>
              <select id="service_to_account" onchange="updateServiceToInfo()">
                <option value="">Sélectionner un compte</option>
              </select>
            </div>
            <div id="service_to_info"></div>
            <div class="form-group">
              <label for="service_source">Service Source *</label>
              <select id="service_source">
                <option value="">Sélectionner un service</option>
                <option value="OM">📱 Orange Money (OM)</option>
                <option value="MOMO">📱 MTN Mobile Money (MOMO)</option>
                <option value="UBA">🏦 UBA Bank</option>
              </select>
            </div>
            <div class="form-group">
              <label for="service_reception_montant">Montant *</label>
              <input
                type="number"
                id="service_reception_montant"
                placeholder="0.00"
                min="0"
                step="0.01"
              />
            </div>
            <div class="form-group">
              <label for="service_emetteur"
                >Numéro de l'Émetteur (optionnel)</label
              >
              <input
                type="text"
                id="service_emetteur"
                placeholder="Ex: +237681234567"
              />
            </div>
            <button onclick="receiveFromService()">Recevoir les Fonds</button>
            <div id="serviceReceptionMessage"></div>
          </div>
        </div>
      </div>

      <!-- TRANSACTIONS TAB -->
      <div id="transactions" class="tab-content">
        <div class="grid">
          <div class="card">
            <h2>Historique - Compte</h2>
            <div class="form-group">
              <label for="transaction_account">Sélectionner un compte</label>
              <select id="transaction_account" onchange="loadTransactions()">
                <option value="">Sélectionner un compte</option>
              </select>
            </div>
            <div id="accountTransactions" class="transaction-list"></div>
          </div>

          <div class="card">
            <h2>Transactions par Service</h2>
            <div class="form-group">
              <label for="transaction_service">Service</label>
              <select
                id="transaction_service"
                onchange="loadServiceTransactions()"
              >
                <option value="">Tous les services</option>
                <option value="OM">Orange Money (OM)</option>
                <option value="MOMO">MTN MOMO</option>
                <option value="UBA">UBA Bank</option>
              </select>
            </div>
            <div id="serviceTransactions" class="transaction-list"></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const API_URL = "/api.php";

      // Initialize
      document.addEventListener("DOMContentLoaded", function () {
        loadAccounts();
      });

      // Tab Switching
      function switchTab(tabName) {
        // Hide all tabs
        document.querySelectorAll(".tab-content").forEach((tab) => {
          tab.classList.remove("active");
        });
        document.querySelectorAll(".tab-button").forEach((btn) => {
          btn.classList.remove("active");
        });

        // Show selected tab
        document.getElementById(tabName).classList.add("active");
        event.target.classList.add("active");

        // Load data for certain tabs
        if (tabName === "transactions") {
          loadAccounts();
        }
      }

      // Load and Display Accounts
      async function loadAccounts() {
        try {
          const response = await fetch(API_URL);
          const data = await response.json();
          const accounts = data.data || [];

          // Update account lists in all dropdowns
          const selects = [
            "depot_account",
            "retrait_account",
            "virement_from",
            "virement_to",
            "service_from_account",
            "service_to_account",
            "transaction_account",
          ];

          selects.forEach((selectId) => {
            const select = document.getElementById(selectId);
            if (select) {
              const currentValue = select.value;
              select.innerHTML =
                '<option value="">Sélectionner un compte</option>';
              accounts.forEach((account) => {
                const option = document.createElement("option");
                option.value = account.id;
                option.textContent = `${account.titulaire} (${account.numero}) - ${account.solde.toFixed(2)} FCFA`;
                select.appendChild(option);
              });
              if (currentValue) select.value = currentValue;
            }
          });

          // Display accounts
          displayAccounts(accounts);
        } catch (error) {
          console.error("Erreur:", error);
          showMessage(
            "createMessage",
            "Erreur de chargement des comptes",
            "error",
          );
        }
      }

      function displayAccounts(accounts) {
        const list = document.getElementById("accountsList");
        list.innerHTML = "";

        if (accounts.length === 0) {
          list.innerHTML = "<p>Aucun compte trouvé. Créez-en un!</p>";
          return;
        }

        accounts.forEach((account) => {
          const accountDiv = document.createElement("div");
          accountDiv.className = "account-info";
          accountDiv.innerHTML = `
                    <p><strong>${account.titulaire}</strong></p>
                    <p>Numéro: ${account.numero}</p>
                    <p>Service: <span class="service-badge">${account.service || "BANQUE"}</span></p>
                    <p class="solde">Solde: ${account.solde.toFixed(2)} FCFA</p>
                    <p><small>ID: ${account.id}</small></p>
                `;
          list.appendChild(accountDiv);
        });
      }

      // Create Account
      async function createAccount() {
        const titulaire = document.getElementById("titulaire").value.trim();

        if (!titulaire) {
          showMessage(
            "createMessage",
            "Veuillez entrer le nom du titulaire",
            "error",
          );
          return;
        }

        try {
          const response = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ titulaire }),
          });

          const data = await response.json();

          if (!response.ok) {
            showMessage(
              "createMessage",
              data.error || "Erreur lors de la création",
              "error",
            );
            return;
          }

          showMessage("createMessage", data.message, "success");
          document.getElementById("titulaire").value = "";
          loadAccounts();
        } catch (error) {
          console.error("Erreur:", error);
          showMessage("createMessage", "Erreur réseau", "error");
        }
      }

      // Deposit
      async function makeDeposit() {
        const accountId = document.getElementById("depot_account").value;
        const montant = parseFloat(
          document.getElementById("depot_montant").value,
        );
        const service = document.getElementById("depot_service").value;
        const description = document.getElementById("depot_desc").value;

        if (!accountId || !montant || montant <= 0) {
          showMessage(
            "depotMessage",
            "Veuillez remplir tous les champs",
            "error",
          );
          return;
        }

        try {
          const response = await fetch(
            `${API_URL}?id=${accountId}&action=depot`,
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                montant,
                description: description || "Dépôt",
                service: service || undefined,
              }),
            },
          );

          const data = await response.json();

          if (!response.ok) {
            showMessage("depotMessage", data.error || "Erreur", "error");
            return;
          }

          showMessage("depotMessage", data.message, "success");
          document.getElementById("depot_montant").value = "";
          document.getElementById("depot_desc").value = "";
          loadAccounts();
        } catch (error) {
          console.error("Erreur:", error);
          showMessage("depotMessage", "Erreur réseau", "error");
        }
      }

      // Withdrawal
      async function makeWithdrawal() {
        const accountId = document.getElementById("retrait_account").value;
        const montant = parseFloat(
          document.getElementById("retrait_montant").value,
        );
        const service = document.getElementById("retrait_service").value;
        const description = document.getElementById("retrait_desc").value;

        if (!accountId || !montant || montant <= 0) {
          showMessage(
            "retraitMessage",
            "Veuillez remplir tous les champs",
            "error",
          );
          return;
        }

        try {
          const response = await fetch(
            `${API_URL}?id=${accountId}&action=retrait`,
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                montant,
                description: description || "Retrait",
                service: service || undefined,
              }),
            },
          );

          const data = await response.json();

          if (!response.ok) {
            showMessage("retraitMessage", data.error || "Erreur", "error");
            return;
          }

          showMessage("retraitMessage", data.message, "success");
          document.getElementById("retrait_montant").value = "";
          document.getElementById("retrait_desc").value = "";
          loadAccounts();
        } catch (error) {
          console.error("Erreur:", error);
          showMessage("retraitMessage", "Erreur réseau", "error");
        }
      }

      // Transfer between accounts
      async function makeTransfer() {
        const from = document.getElementById("virement_from").value;
        const to = document.getElementById("virement_to").value;
        const montant = parseFloat(
          document.getElementById("virement_montant").value,
        );

        if (!from || !to || !montant || montant <= 0) {
          showMessage(
            "virementMessage",
            "Veuillez remplir tous les champs",
            "error",
          );
          return;
        }

        if (from === to) {
          showMessage(
            "virementMessage",
            "Vous ne pouvez pas virer vers le même compte",
            "error",
          );
          return;
        }

        try {
          const response = await fetch(
            `${API_URL}?id=${from}&action=virement`,
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                montant,
                compte_destinataire: parseInt(to),
              }),
            },
          );

          const data = await response.json();

          if (!response.ok) {
            showMessage("virementMessage", data.error || "Erreur", "error");
            return;
          }

          showMessage("virementMessage", data.message, "success");
          document.getElementById("virement_montant").value = "";
          loadAccounts();
        } catch (error) {
          console.error("Erreur:", error);
          showMessage("virementMessage", "Erreur réseau", "error");
        }
      }

      // Transfer to Service
      async function transferToService() {
        const from = document.getElementById("service_from_account").value;
        const service = document.getElementById("service_destination").value;
        const montant = parseFloat(
          document.getElementById("service_montant").value,
        );
        const numero = document.getElementById("service_numero").value;

        if (!from || !service || !montant || montant <= 0) {
          showMessage(
            "serviceTransferMessage",
            "Veuillez remplir les champs obligatoires",
            "error",
          );
          return;
        }

        try {
          const response = await fetch(
            `${API_URL}?id=${from}&action=transfert_service`,
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                montant,
                service_destination: service,
                numero_beneficiaire: numero || undefined,
              }),
            },
          );

          const data = await response.json();

          if (!response.ok) {
            showMessage(
              "serviceTransferMessage",
              data.error || "Erreur",
              "error",
            );
            return;
          }

          showMessage(
            "serviceTransferMessage",
            `✓ ${data.message}\n📌 Référence: ${data.details.reference}`,
            "success",
          );
          document.getElementById("service_montant").value = "";
          document.getElementById("service_numero").value = "";
          loadAccounts();
        } catch (error) {
          console.error("Erreur:", error);
          showMessage("serviceTransferMessage", "Erreur réseau", "error");
        }
      }

      // Receive from Service
      async function receiveFromService() {
        const to = document.getElementById("service_to_account").value;
        const service = document.getElementById("service_source").value;
        const montant = parseFloat(
          document.getElementById("service_reception_montant").value,
        );
        const numero = document.getElementById("service_emetteur").value;

        if (!to || !service || !montant || montant <= 0) {
          showMessage(
            "serviceReceptionMessage",
            "Veuillez remplir les champs obligatoires",
            "error",
          );
          return;
        }

        try {
          const response = await fetch(
            `${API_URL}?id=${to}&action=reception_service`,
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                montant,
                service_origine: service,
                numero_emetteur: numero || undefined,
              }),
            },
          );

          const data = await response.json();

          if (!response.ok) {
            showMessage(
              "serviceReceptionMessage",
              data.error || "Erreur",
              "error",
            );
            return;
          }

          showMessage(
            "serviceReceptionMessage",
            `✓ ${data.message}\n📌 Référence: ${data.details.reference}`,
            "success",
          );
          document.getElementById("service_reception_montant").value = "";
          document.getElementById("service_emetteur").value = "";
          loadAccounts();
        } catch (error) {
          console.error("Erreur:", error);
          showMessage("serviceReceptionMessage", "Erreur réseau", "error");
        }
      }

      // Load Transactions
      async function loadTransactions() {
        const accountId = document.getElementById("transaction_account").value;

        if (!accountId) {
          document.getElementById("accountTransactions").innerHTML = "";
          return;
        }

        try {
          const response = await fetch(`${API_URL}?id=${accountId}`);
          const data = await response.json();

          if (!data.transactions) {
            document.getElementById("accountTransactions").innerHTML =
              "<p>Aucune transaction</p>";
            return;
          }

          displayTransactions(data.transactions, "accountTransactions");
        } catch (error) {
          console.error("Erreur:", error);
          document.getElementById("accountTransactions").innerHTML =
            "<p>Erreur de chargement</p>";
        }
      }

      async function loadServiceTransactions() {
        const service = document.getElementById("transaction_service").value;

        try {
          const url = service
            ? `${API_URL}?action=transactions_service&service=${service}`
            : `${API_URL}?action=transactions`;
          const response = await fetch(url);
          const data = await response.json();

          if (!data.data || data.data.length === 0) {
            document.getElementById("serviceTransactions").innerHTML =
              "<p>Aucune transaction</p>";
            return;
          }

          displayTransactions(data.data, "serviceTransactions");
        } catch (error) {
          console.error("Erreur:", error);
          document.getElementById("serviceTransactions").innerHTML =
            "<p>Erreur de chargement</p>";
        }
      }

      function displayTransactions(transactions, elementId) {
        const container = document.getElementById(elementId);
        container.innerHTML = "";

        if (!transactions || transactions.length === 0) {
          container.innerHTML = "<p>Aucune transaction</p>";
          return;
        }

        transactions.forEach((transaction) => {
          const transDiv = document.createElement("div");
          transDiv.className = `transaction-item ${transaction.type}`;

          const amount =
            transaction.montant > 0
              ? `+${transaction.montant.toFixed(2)}`
              : `${transaction.montant.toFixed(2)}`;
          const amountColor = transaction.montant > 0 ? "#28a745" : "#dc3545";

          let serviceInfo = "";
          if (transaction.service) {
            serviceInfo += `<span class="service-badge ${transaction.service.toLowerCase()}">${transaction.service}</span>`;
          }
          if (transaction.service_destination) {
            serviceInfo += `<span class="service-badge ${transaction.service_destination.toLowerCase()}">${transaction.service_destination}</span>`;
          }

          transDiv.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: start;">
                        <div>
                            <strong>${transaction.type.replace(/_/g, " ").toUpperCase()}</strong>
                            <p>${transaction.description}</p>
                            ${serviceInfo}
                        </div>
                        <span style="color: ${amountColor}; font-weight: bold; font-size: 1.1em;">${amount} FCFA</span>
                    </div>
                    <small>${transaction.date}</small>
                `;

          container.appendChild(transDiv);
        });
      }

      // Update Info Functions
      function updateDepotInfo() {
        updateAccountInfo("depot_account", "depot_info");
      }

      function updateRetraitInfo() {
        updateAccountInfo("retrait_account", "retrait_info");
      }

      function updateVirementInfo() {
        updateAccountInfo("virement_from", "virement_info");
      }

      function updateServiceFromInfo() {
        updateAccountInfo("service_from_account", "service_from_info");
      }

      function updateServiceToInfo() {
        updateAccountInfo("service_to_account", "service_to_info");
      }

      function updateAccountInfo(selectId, infoId) {
        const accountId = document.getElementById(selectId).value;
        const infoDiv = document.getElementById(infoId);

        if (!accountId) {
          infoDiv.innerHTML = "";
          return;
        }

        fetch(`${API_URL}?id=${accountId}`)
          .then((r) => r.json())
          .then((data) => {
            if (data.compte) {
              infoDiv.innerHTML = `
                            <div class="account-info">
                                <p><strong>${data.compte.titulaire}</strong></p>
                                <p>Solde: <span class="solde">${data.compte.solde.toFixed(2)} FCFA</span></p>
                                <p>Service: ${data.compte.service || "BANQUE"}</p>
                            </div>
                        `;
            }
          });
      }

      // Helper function
      function showMessage(elementId, message, type) {
        const element = document.getElementById(elementId);
        element.className = `message ${type}`;
        element.textContent = message;
        setTimeout(() => {
          element.textContent = "";
        }, 5000);
      }
    </script>
  </body>
</html>
